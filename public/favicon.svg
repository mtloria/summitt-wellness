<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark navy background, rounded for app-icon contexts -->
  <rect width="100" height="100" rx="18" fill="#1C2F3E"/>

  <!-- Mountain ridge silhouette — loosely traced from the SW badge logo -->
  <path
    fill="#FFFFFF"
    d="M5 73
       L18 47
       L25 57
       L36 24
       L45 44
       L54 33
       L63 49
       L72 40
       L95 73
       Z"
